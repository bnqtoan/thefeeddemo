<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — A Realistic Dreamer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fafaf9;
      color: #1c1917;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: #78716c;
      font-size: 0.95rem;
      max-width: 28rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: #1e40af;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    .home-link {
      margin-top: 1rem;
      color: #78716c;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .home-link:hover { color: #1c1917; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>This page isn't available offline yet. Connect to the internet or try a page you've visited before.</p>
  <button onclick="window.location.reload()">Try again</button>
  <a href="/" class="home-link">← Back to home</a>
</body>
</html>
