name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      content_only: ${{ steps.classify.outputs.content_only }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - '**'
      - name: Classify change type
        id: classify
        if: steps.filter.outputs.app == 'true'
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "content_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NON_CONTENT=$(echo "$CHANGED" | grep -v -E '^src/content/' || true)
          if [ -z "$NON_CONTENT" ]; then
            echo "content_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "content_only=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-app:
    name: Deploy Astro App
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci

      # IMPORTANT: No restore-keys fallback — stale cache causes new content to 404
      - name: Cache Astro
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
            .astro
          key: astro-${{ runner.os }}-${{ hashFiles('src/content/**') }}

      - run: npm run build

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # Optional: Telegram deploy notification
